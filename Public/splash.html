<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<style>

body{

  background:#050816;

  display:flex;

  justify-content:center;

  align-items:center;

  height:100vh;

  overflow:hidden;

  font-family:Arial;

  color:white;
}

.box{

  text-align:center;
}

.logo{

  font-size:42px;

  color:#00d4ff;

  margin-bottom:20px;

  animation:pulse 1.5s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.5;
    transform:scale(1);
  }

  50%{
    opacity:1;
    transform:scale(1.05);
  }

  100%{
    opacity:0.5;
    transform:scale(1);
  }
}

</style>

</head>

<body>

<div class="box">

  <div class="logo">
    QuimLab AI
  </div>

  <div>
    Iniciando aplicación...
  </div>

</div>

</body>
</html>
