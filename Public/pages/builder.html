<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>QuimLab AI Builder</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#050816;

      color:white;

      font-family:
      Arial,
      Helvetica,
      sans-serif;

      min-height:100vh;

      padding:40px;
    }

    .container{

      max-width:1200px;

      margin:auto;
    }

    .topbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:40px;
    }

    .title{

      font-size:42px;

      color:#00d4ff;
    }

    .subtitle{

      color:#8ea3b0;

      margin-top:10px;
    }

    .back-btn{

      padding:14px 20px;

      border:none;

      border-radius:10px;

      background:#0f172a;

      color:white;

      cursor:pointer;

      transition:0.3s;
    }

    .back-btn:hover{

      background:#172554;
    }

    .grid{

      display:grid;

      grid-template-columns:
      400px
      1fr;

      gap:30px;
    }

    .card{

      background:#0b1220;

      border:1px solid #1f2d3d;

      border-radius:16px;

      padding:25px;

      box-shadow:
      0 0 25px rgba(0,0,0,0.4);
    }

    label{

      display:block;

      margin-bottom:10px;

      color:#8ea3b0;
    }

    select,
    input{

      width:100%;

      padding:16px;

      background:#020617;

      border:1px solid #243447;

      border-radius:10px;

      color:white;

      font-size:16px;

      margin-bottom:20px;
    }

    button{

      width:100%;

      padding:18px;

      border:none;

      border-radius:10px;

      background:#00d4ff;

      color:black;

      font-size:18px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{

      transform:scale(1.02);

      background:#35ddff;
    }

    .result{

      background:#020617;

      border:1px solid #243447;

      border-radius:12px;

      padding:20px;

      min-height:500px;

      white-space:pre-wrap;

      line-height:1.7;

      overflow:auto;
    }

    .loading{

      color:#00d4ff;
    }

    .error{

      color:#ff5c5c;
    }

    .preview{

      margin-bottom:25px;

      padding:20px;

      border-radius:12px;

      background:#020617;

      border:1px solid #243447;
    }

    .preview h3{

      margin-bottom:12px;

      color:#00d4ff;
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="topbar">

      <div>

        <h1 class="title">
          QuimLab Builder
        </h1>

        <p class="subtitle">
          Construye moléculas orgánicas paso a paso
        </p>

      </div>

      <button
        class="back-btn"
        onclick="window.location.href='/'"
      >
        Volver
      </button>

    </div>

    <div class="grid">

      <!-- PANEL IZQUIERDO -->

      <div class="card">

        <label>
          Cantidad de carbonos
        </label>

        <select id="carbonos"
  onchange="actualizarPosiciones()"
>

          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>

        </select>

        <label>
          Grupo funcional
        </label>

        <select id="grupo">

          <option value="alcohol">
            Alcohol
          </option>

          <option value="aldehido">
            Aldehído
          </option>

          <option value="cetona">
            Cetona
          </option>

          <option value="amina">
            Amina
          </option>

          <option value="acido carboxilico">
            Ácido carboxílico
          </option>

          <option value="alqueno">
            Alqueno
          </option>

          <option value="alquino">
            Alquino
          </option>

        </select>

        <label>
          Sustituyente
        </label>

        <select id="sustituyente">

          <option value="ninguno">
            Ninguno
          </option>

          <option value="metil">
            Metil
          </option>

          <option value="etil">
            Etil
          </option>

          <option value="propil">
            Propil
          </option>

          <option value="cloro">
            Cloro
          </option>

          <option value="bromo">
            Bromo
          </option>

        </select>

        <label>
          Posición del sustituyente
        </label>

      <select id="posicion">

  <option value="1">1</option>

</select>

        <button onclick="construir()">
          Construir Molécula
        </button>

      </div>

      <!-- PANEL DERECHO -->

      <div class="card">

        <div class="preview">

          <h3>
            Vista previa
          </h3>

          <div id="previewText">

            Cadena de 1 carbono,
            alcohol,
            sin sustituyentes.

          </div>

        </div>

        <div
          id="resultado"
          class="result"
        >

Esperando construcción...

        </div>

      </div>

    </div>

  </div>

<script>

const carbonos =
  document.getElementById(
    'carbonos'
  );

const grupo =
  document.getElementById(
    'grupo'
  );

const sustituyente =
  document.getElementById(
    'sustituyente'
  );

const posicion =
  document.getElementById(
    'posicion'
  );

function actualizarPreview(){

  document.getElementById(
    'previewText'
  ).textContent =

  `Cadena de ${carbonos.value} carbonos,
${grupo.value},
sustituyente ${sustituyente.value}
en posición ${posicion.value}.`;
}

grupo.onchange =
actualizarPreview;

sustituyente.onchange =
actualizarPreview;

posicion.oninput =
actualizarPreview;

carbonos.onchange = () => {

  actualizarPosiciones();

  actualizarPreview();
};
function actualizarPosiciones(){

  const carbonos = Number(

    document.getElementById(
      'carbonos'
    ).value
  );

  const posicion =

    document.getElementById(
      'posicion'
    );

  posicion.innerHTML = '';

  for(let i = 1; i <= carbonos; i++){

    posicion.innerHTML += `

      <option value="${i}">
        ${i}
      </option>

    `;
  }

  actualizarPreview();
}

actualizarPosiciones();
async function construir(){

  const resultado =

    document.getElementById(
      'resultado'
    );

  resultado.innerHTML =

    '<span class="loading">Construyendo molécula...</span>';

  try{

    const response = await fetch(

      '/api/build',

      {

        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({

          carbonos:
            carbonos.value,

          grupo:
            grupo.value,

          sustituyente:
            sustituyente.value,

          posicion:
            posicion.value
        })
      }
    );

    const data =
      await response.json();

    console.log(data);

console.log(data);

if(data.error){

  resultado.innerHTML =

    '<span class="error">' +

    data.error.message +

    '</span>';

  return;
}

const txt =

  data.choices &&
  data.choices[0] &&
  data.choices[0].message &&
  data.choices[0].message.content

  ? data.choices[0].message.content

  : JSON.stringify(data, null, 2);

resultado.textContent =
  txt;

    resultado.textContent =
      txt;
  }

  catch(err){

    console.error(err);

    resultado.innerHTML =

      '<span class="error">' +

      err.message +

      '</span>';
  }
}
</script>

</body>

</html>
